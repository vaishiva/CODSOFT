<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a0a2e 100%);
      font-family: 'Inter', sans-serif;
    }

    h1 {
      font-family: 'Space Grotesk', sans-serif;
      color: #fff;
      font-size: 1.1rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
      opacity: 0.6;
    }

    .calculator {
      background: #1a1a2e;
      border-radius: 28px;
      padding: 2rem;
      width: 360px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
    }

    /* DISPLAY */
    .display {
      background: rgba(0,0,0,0.3);
      border-radius: 16px;
      padding: 1.5rem 1.5rem 1rem;
      margin-bottom: 1.5rem;
      min-height: 110px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      border: 1px solid rgba(255,255,255,0.05);
    }
    .expression {
      color: rgba(255,255,255,0.35);
      font-size: 0.95rem;
      min-height: 1.4rem;
      word-break: break-all;
      margin-bottom: 0.4rem;
    }
    .result {
      font-family: 'Space Grotesk', sans-serif;
      color: #fff;
      font-size: 2.8rem;
      font-weight: 700;
      word-break: break-all;
      line-height: 1;
    }

    /* BUTTONS GRID */
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    button {
      border: none;
      border-radius: 14px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      padding: 1.1rem;
      transition: transform 0.1s, box-shadow 0.2s, filter 0.2s;
      outline: none;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { transform: scale(0.93); }

    /* Number buttons */
    .btn-num {
      background: #252542;
      color: #e0e0f5;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    .btn-num:hover { background: #2e2e55; filter: brightness(1.1); }

    /* Operator buttons */
    .btn-op {
      background: rgba(91,79,255,0.2);
      color: #8b7fff;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    .btn-op:hover { background: rgba(91,79,255,0.35); }

    /* Clear / special */
    .btn-clear {
      background: rgba(255,79,155,0.15);
      color: #ff6fa3;
    }
    .btn-clear:hover { background: rgba(255,79,155,0.3); }

    /* Equals */
    .btn-equals {
      background: linear-gradient(135deg, #5b4fff, #ff4f9b);
      color: #fff;
      box-shadow: 0 6px 20px rgba(91,79,255,0.4);
    }
    .btn-equals:hover { box-shadow: 0 8px 28px rgba(91,79,255,0.6); filter: brightness(1.05); }

    /* Zero spans 2 columns */
    .span2 { grid-column: span 2; }

    /* History */
    .history {
      margin-top: 1.5rem;
      max-height: 120px;
      overflow-y: auto;
    }
    .history h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: rgba(255,255,255,0.3);
      margin-bottom: 0.6rem;
    }
    .history-item {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.4);
      padding: 0.3rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      text-align: right;
    }
    .history-item:last-child { border: none; }
    .history::-webkit-scrollbar { width: 4px; }
    .history::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* Error shake animation */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%,60% { transform: translateX(-8px); }
      40%,80% { transform: translateX(8px); }
    }
    .shake { animation: shake 0.4s ease; }
  </style>
</head>
<body>

  <h1>Calculator</h1>

  <div class="calculator">
    <!-- Display -->
    <div class="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result">0</div>
    </div>

    <!-- Buttons -->
    <div class="buttons">
      <!-- Row 1 -->
      <button class="btn-clear" onclick="clearAll()">AC</button>
      <button class="btn-clear" onclick="toggleSign()">+/-</button>
      <button class="btn-clear" onclick="percentage()">%</button>
      <button class="btn-op" onclick="setOperator('/')">÷</button>

      <!-- Row 2 -->
      <button class="btn-num" onclick="appendNum('7')">7</button>
      <button class="btn-num" onclick="appendNum('8')">8</button>
      <button class="btn-num" onclick="appendNum('9')">9</button>
      <button class="btn-op" onclick="setOperator('*')">×</button>

      <!-- Row 3 -->
      <button class="btn-num" onclick="appendNum('4')">4</button>
      <button class="btn-num" onclick="appendNum('5')">5</button>
      <button class="btn-num" onclick="appendNum('6')">6</button>
      <button class="btn-op" onclick="setOperator('-')">−</button>

      <!-- Row 4 -->
      <button class="btn-num" onclick="appendNum('1')">1</button>
      <button class="btn-num" onclick="appendNum('2')">2</button>
      <button class="btn-num" onclick="appendNum('3')">3</button>
      <button class="btn-op" onclick="setOperator('+')">+</button>

      <!-- Row 5 -->
      <button class="btn-num span2" onclick="appendNum('0')">0</button>
      <button class="btn-num" onclick="appendDot()">.</button>
      <button class="btn-equals" onclick="calculate()">=</button>
    </div>

    <!-- History -->
    <div class="history">
      <h3>History</h3>
      <div id="historyList"></div>
    </div>
  </div>

  <script>
    let currentInput = '0';
    let prevInput = '';
    let operator = null;
    let justCalculated = false;
    let history = [];

    const resultEl = document.getElementById('result');
    const expressionEl = document.getElementById('expression');
    const historyListEl = document.getElementById('historyList');

    function updateDisplay(val) {
      // Format large numbers
      if (!isNaN(val) && val !== '' && val !== '-') {
        let num = parseFloat(val);
        if (Math.abs(num) >= 1e10) {
          resultEl.textContent = num.toExponential(4);
        } else {
          resultEl.textContent = val;
        }
      } else {
        resultEl.textContent = val || '0';
      }
    }

    function appendNum(n) {
      if (justCalculated) {
        currentInput = n;
        justCalculated = false;
        expressionEl.textContent = '';
      } else {
        if (currentInput === '0' && n !== '.') {
          currentInput = n;
        } else {
          if (currentInput.length >= 12) return;
          currentInput += n;
        }
      }
      updateDisplay(currentInput);
    }

    function appendDot() {
      if (justCalculated) { currentInput = '0'; justCalculated = false; }
      if (!currentInput.includes('.')) {
        currentInput += '.';
        updateDisplay(currentInput);
      }
    }

    function setOperator(op) {
      if (operator && !justCalculated && prevInput !== '') {
        calculate(true);
      }
      prevInput = currentInput;
      operator = op;
      justCalculated = false;
      const opDisplay = { '+': '+', '-': '−', '*': '×', '/': '÷' }[op];
      expressionEl.textContent = `${prevInput} ${opDisplay}`;
      currentInput = '0';
    }

    function calculate(intermediate = false) {
      if (!operator || prevInput === '') return;
      let a = parseFloat(prevInput);
      let b = parseFloat(currentInput);
      let res;

      if (operator === '/' && b === 0) {
        showError();
        return;
      }

      switch(operator) {
        case '+': res = a + b; break;
        case '-': res = a - b; break;
        case '*': res = a * b; break;
        case '/': res = a / b; break;
      }

      // Round floating point
      res = parseFloat(res.toPrecision(12));

      const opDisplay = { '+': '+', '-': '−', '*': '×', '/': '÷' }[operator];

      if (!intermediate) {
        // Add to history
        const entry = `${a} ${opDisplay} ${b} = ${res}`;
        history.unshift(entry);
        if (history.length > 10) history.pop();
        renderHistory();
        expressionEl.textContent = `${a} ${opDisplay} ${b} =`;
      }

      currentInput = String(res);
      operator = null;
      prevInput = '';
      justCalculated = !intermediate;
      updateDisplay(currentInput);
    }

    function clearAll() {
      currentInput = '0';
      prevInput = '';
      operator = null;
      justCalculated = false;
      expressionEl.textContent = '';
      updateDisplay('0');
    }

    function toggleSign() {
      if (currentInput !== '0') {
        currentInput = currentInput.startsWith('-')
          ? currentInput.slice(1)
          : '-' + currentInput;
        updateDisplay(currentInput);
      }
    }

    function percentage() {
      let num = parseFloat(currentInput);
      currentInput = String(num / 100);
      updateDisplay(currentInput);
    }

    function showError() {
      resultEl.textContent = 'Error';
      resultEl.classList.add('shake');
      setTimeout(() => {
        resultEl.classList.remove('shake');
        clearAll();
      }, 600);
    }

    function renderHistory() {
      historyListEl.innerHTML = history
        .map(h => `<div class="history-item">${h}</div>`)
        .join('');
    }

    // Keyboard support
    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') appendNum(e.key);
      else if (e.key === '.') appendDot();
      else if (e.key === '+') setOperator('+');
      else if (e.key === '-') setOperator('-');
      else if (e.key === '*') setOperator('*');
      else if (e.key === '/') { e.preventDefault(); setOperator('/'); }
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        if (currentInput.length > 1) {
          currentInput = currentInput.slice(0, -1);
        } else {
          currentInput = '0';
        }
        updateDisplay(currentInput);
      }
    });
  </script>
</body>
</html>
